baseURL: "https://tweakzx.github.io/"
locale: "zh-cn"
title: "李志轩 | Tweakzx"
theme: "tweakzx-porto"
hasCJKLanguage: true
defaultContentLanguage: "en"

pagination:
  pagerSize: 8

permalinks:
  post: /p/:slug/
  page: /:slug/

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  author:
    name: "Tweakzx"
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: "/images/avatar.png"
  description: "李志轩的个人作品集与技术博客，关注大模型系统、云原生调度、GPU/NPU 资源管理与 AI 基础设施。"
  footer:
    since: 2020
  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04 MST"
  article:
    math: true
    toc: true
    readingTime: true
    license:
      enabled: true
      default: "Licensed under CC BY-NC-SA 4.0"
  comments:
    enabled: false

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
  goldmark:
    renderer:
      unsafe: true
